<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Телефонная книга</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        h1 {
            background-color: #333;
            color: white;
            padding: 10px;
            margin-top: 0;
            text-align: center;
        }
        
        .form {
            margin-bottom: 20px;
            padding: 15px;
            background: #e9e9e9;
        }
        
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
        
        button {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #555;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        
        th {
            background-color: #333;
            color: white;
        }
        
        .delete-btn {
            background-color: red;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }
        
        .edit-btn {
            background-color: blue;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .delete-btn:hover {
            background-color: darkred;
        }
        
        .edit-btn:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 Телефонная книга</h1>
        
        <!-- Форма добавления контакта -->
        <div class="form">
            <h3>Добавить контакт:</h3>
            <input type="text" id="name" placeholder="Имя">
            <input type="text" id="phone" placeholder="Телефон">
            <button onclick="addContact()">Добавить</button>
        </div>
        
        <!-- Таблица с контактами -->
        <h3>Список контактов:</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="contacts-list">
                {% for contact in contacts %}
                <tr id="contact-{{ contact.id }}">
                    <td>{{ contact.id }}</td>
                    <td class="name-{{ contact.id }}">{{ contact.name }}</td>
                    <td class="phone-{{ contact.id }}">{{ contact.phone }}</td>
                    <td>
                        <button class="edit-btn" onclick='editContact({{ contact.id }})'>✏️</button>
                        <button class="delete-btn" onclick='deleteContact({{ contact.id }})'>🗑️</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
    <script>
        // Добавление контакта
        async function addContact() {
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            
            if (name === '' || phone === '') {
                alert('Заполните имя и телефон!');
                return;
            }
            
            let response = await fetch('/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, phone: phone})
            });
            
            if (response.ok) {
                location.reload();  // Перезагружаем страницу
            } else {
                alert('Ошибка при добавлении');
            }
        }
        
        // Удаление контакта
        async function deleteContact(id) {
            if (confirm('Удалить контакт?')) {
                let response = await fetch('/delete/' + id, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    location.reload();
                } else {
                    alert('Ошибка при удалении');
                }
            }
        }
        
        // Редактирование контакта
        async function editContact(id) {
            let oldName = document.querySelector('.name-' + id).innerText;
            let oldPhone = document.querySelector('.phone-' + id).innerText;
            
            let newName = prompt('Введите новое имя:', oldName);
            if (newName === null) return;
            
            let newPhone = prompt('Введите новый телефон:', oldPhone);
            if (newPhone === null) return;
            
            let response = await fetch('/update/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: newName, phone: newPhone})
            });
            
            if (response.ok) {
                location.reload();
            } else {
                alert('Ошибка при обновлении');
            }
        }
    </script>
</body>
</html>
